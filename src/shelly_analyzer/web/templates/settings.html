<style>
:root{--bg:#0b0f14;--card:#121821;--fg:#e8eef6;--muted:#9fb0c3;--accent:#6aa7ff;

*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
background:var(--bg);color:var(--fg);line-height:1.45;font-size:14px}
a{color:var(--accent);text-decoration:none}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--card);
border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
header h1{font-size:1rem;margin:0;flex:1;font-weight:600}
.layout{display:flex;min-height:calc(100vh - 50px)}
.sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);
padding:12px 0;overflow-y:auto;position:sticky;top:50px;max-height:calc(100vh - 50px);flex-shrink:0}
.sidebar h3{font-size:.7rem;text-transform:uppercase;color:var(--muted);
padding:8px 16px 4px;margin:0;letter-spacing:.05em}
.sidebar a{display:block;padding:7px 16px;color:var(--fg);font-size:.88rem;border-left:3px solid transparent}
.sidebar a:hover{background:rgba(106,167,255,.08)}
.sidebar a.active{background:rgba(106,167,255,.15);border-left-color:var(--accent);color:var(--accent)}
main{flex:1;padding:20px;max-width:900px;min-width:0}
section{margin-bottom:30px;background:var(--card);border:1px solid var(--border);
border-radius:12px;padding:16px 20px;scroll-margin-top:60px}
section h2{margin:0 0 14px;font-size:1.05rem;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px}
.field{margin-bottom:12px;display:flex;flex-direction:column;gap:4px}
.field.row{flex-direction:row;align-items:center;gap:10px}
.field label{font-size:.82rem;color:var(--muted);font-weight:500}
.field.row label{flex:1}
input[type="text"],input[type="password"],input[type="number"],input[type="email"],input[type="url"],select,textarea{
padding:8px 10px;border:1px solid var(--border);background:rgba(255,255,255,.03);
color:var(--fg);border-radius:6px;font-size:.88rem;font-family:inherit;width:100%}
textarea{resize:vertical;min-height:60px;font-family:ui-monospace,monospace}
input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
select{cursor:pointer}
button{padding:8px 14px;border:none;background:var(--accent);color:#fff;border-radius:6px;
cursor:pointer;font-size:.88rem;font-weight:500}
button:hover{opacity:.9}
button.secondary{background:rgba(255,255,255,.08);color:var(--fg)}
button.danger{background:var(--danger)}
button.small{padding:4px 8px;font-size:.78rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.section-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;
padding-top:12px;border-top:1px solid var(--border)}
.hint{font-size:.75rem;color:var(--muted);margin-top:2px}
.devcard{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;
padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.devcard .info{flex:1}
.devcard h4{margin:0 0 2px;font-size:.95rem}
.devcard p{margin:0;font-size:.78rem;color:var(--muted)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#888;margin-right:4px}
.dot.online{background:var(--ok)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);

opacity:0;transform:translateY(10px);transition:all .2s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-color:var(--danger)}

.sidebar{width:100%;position:static;max-height:none;display:flex;flex-wrap:wrap;padding:8px}

.sidebar a{border-left:none;padding:6px 10px}
.grid2{grid-template-columns:1fr}
main{padding:12px}

function toast(msg, kind="success") {
  const el = $("#toast");
  el.textContent = msg;
  el.className = "toast show " + kind;
  setTimeout(()=>el.className="toast",2500);
}

function get(obj, path, def="") {
  return path.split(".").reduce((o,k)=> (o && o[k]!==undefined) ? o[k] : def, obj);
}
function setPath(obj, path, val) {
  const parts = path.split(".");
  const last = parts.pop();
  let o = obj;
  for (const k of parts) { if (!o[k]) o[k]={}; o=o[k]; }
  o[last] = val;
}

function gatherSection(sectionId) {
  const sec = $("#sec-"+sectionId);
  if (!sec) return {};
  const data = {};
  $$('[data-key]',sec).forEach(inp=>{
    const key = inp.dataset.key;
    let val;
    if (inp.type === "checkbox") val = inp.checked;
    else if (inp.type === "number") val = inp.value === "" ? 0 : Number(inp.value);
    else val = inp.value;
    setPath(data, key, val);
  });
  return data;
}

async function saveSection(sectionId) {
  const data = gatherSection(sectionId);
  try {
    const r = await fetch("/api/settings",{method:"PUT",
      headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
    const j = await r.json();
    if (j.ok) toast("✓ Gespeichert");
    else toast("Fehler: " + j.error, "error");
  } catch(e) { toast("Fehler: " + e.message, "error"); }
}

    {key:"billing.issuer.vat_id", label:"Aussteller USt-ID", type:"text"},

    {key:"billing.issuer.phone", label:"Aussteller Telefon", type:"text"},
    {key:"billing.issuer.iban", label:"Aussteller IBAN", type:"text"},
    {key:"billing.issuer.bic", label:"Aussteller BIC", type:"text"},
    {key:"billing.customer.name", label:"Kunde Name", type:"text"},

  {id:"about", title:"Über", group:"Erweitert", custom:true},
];

function renderField(f) {
  const val = get(cfg, f.key, "");
  let input;
  if (f.type === "checkbox") {
    input = `<input type="checkbox" data-key="${f.key}" ${val?"checked":""}>`;
    return `<div class="field row"><label>${f.label}</label>${input}</div>`;
  }
  if (f.type === "select" || f.type === "select-device") {
    let opts = f.opts || [];
    if (f.type === "select-device") {
      opts = [["","(keine)"]].concat(devices.map(d=>[d.key, d.name+" ("+d.key+")"]));
    }
    const options = opts.map(([k,v])=>`<option value="${k}" ${String(k)===String(val)?"selected":""}>${v}</option>`).join("");
    input = `<select data-key="${f.key}">${options}</select>`;
  } else if (f.type === "textarea") {
    input = `<textarea data-key="${f.key}">${val||""}</textarea>`;
  } else {
    const step = f.step ? `step="${f.step}"` : "";
    const tp = f.type === "password" ? "password" : f.type === "number" ? "number" : (f.type === "email"?"email":(f.type==="url"?"url":"text"));
    input = `<input type="${tp}" ${step} data-key="${f.key}" value="${val===null||val===undefined?"":String(val).replace(/"/g,"&quot;")}">`;
  }
  const hint = f.hint ? `<div class="hint">${f.hint}</div>` : "";
  return `<div class="field"><label>${f.label}</label>${input}${hint}</div>`;
}

function renderSection(s) {
  if (s.custom) {
    if (s.id === "devices") return renderDevices();
    if (s.id === "about") return renderAbout();
    if (s.id === "health") return renderHealth();
    if (s.id === "alerts") return renderAlerts();
  }
  const fieldsHtml = (s.fields||[]).map(renderField).join("");
  const hint = s.hint ? `<div class="hint" style="margin-bottom:10px">${s.hint}</div>` : "";
  const testBtn = s.testBtn ? `<button class="secondary" onclick="testConnection('${s.testBtn}')">🔌 Test</button>` : "";
  return `<section id="sec-${s.id}"><h2>${s.title}</h2>${hint}
    <div class="grid2">${fieldsHtml}</div>
    <div class="section-actions">${testBtn}
      <button onclick="saveSection('${s.id}')">💾 Speichern</button>
    </div></section>`;
}

function renderDevices() {
  const rows = devices.map(d=>`
    <div class="devcard">
      <div class="info">
        <h4><span class="dot ${d.online?"online":""}"></span>${d.name}</h4>
        <p>${d.host} · ${d.kind} · ${d.phases}P · ${d.key}</p>
      </div>
      <div>
        <button class="small danger" onclick="deleteDevice('${d.key}')">✕</button>
      </div>
    </div>`).join("");
  return `<section id="sec-devices"><h2>Geräte</h2>
    ${rows || "<p class='hint'>Keine Geräte konfiguriert</p>"}
    <div class="section-actions" style="justify-content:space-between;flex-wrap:wrap">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="secondary" onclick="discoverDevices()">🔍 mDNS Scan</button>
        <input id="probe-ip" type="text" placeholder="IP-Adresse" style="width:160px">
        <button class="secondary" onclick="addByIp()">➕ Hinzufügen</button>
      </div>
    </div>
    <div id="discover-results"></div>
  </section>`;
}

function renderAbout() {
  return `<section id="sec-about"><h2>Über</h2>
    <p>App-Version: <strong id="about-version">Lade…</strong></p>
    <p>Config-Version: <span class="hint">${cfg.version||"?"}</span></p>
    <div id="about-stats" class="hint">Lade DB-Statistik…</div>
  </section>`;
}

function renderHealth() {
  return `<section id="sec-health"><h2>Health Check</h2>
    <p class="hint">Ping aller Shellys + Firmware-Status</p>
    <div class="section-actions" style="justify-content:flex-start;margin-top:0;border-top:none;padding-top:0;flex-wrap:wrap">
      <button class="secondary" onclick="runHealthCheck()">🩺 Jetzt prüfen</button>
      <button class="secondary" onclick="updateAllWithPendingFirmware()">⬆ Alle updaten</button>
    </div>
    <div id="health-results" style="margin-top:12px"><p class="hint">Klick "Jetzt prüfen" für aktuellen Status</p></div>
  </section>`;
}

let alertRules = [];
const METRICS = ["W","V","A","VAR","COSPHI","W_L1","W_L2","W_L3","V_L1","V_L2","V_L3","A_L1","A_L2","A_L3"];
const OPS = [">","<",">=","<=","="];

function renderAlerts() {
  const devOpts = '<option value="*">Alle Geräte</option>' +
    devices.map(d=>`<option value="${d.key}">${d.name}</option>`).join("");
  return `<section id="sec-alerts"><h2>Alarm-Regeln</h2>
    <div id="alerts-list"><p class="hint">Lade…</p></div>
    <div class="section-actions" style="justify-content:flex-start">
      <button onclick="addAlertRule()">➕ Neue Regel</button>
      <button class="secondary" onclick="loadAlerts()">↻ Aktualisieren</button>
    </div>
    <template id="alert-tmpl">
      <div class="devcard" style="flex-direction:column;align-items:stretch">
        <div class="grid2" style="width:100%">
          <div class="field"><label>Name / ID</label><input class="a-id" type="text"></div>
          <div class="field row"><label>Aktiv</label><input class="a-enabled" type="checkbox"></div>
          <div class="field"><label>Gerät</label><select class="a-device">${devOpts}</select></div>
          <div class="field"><label>Metrik</label><select class="a-metric">${METRICS.map(m=>`<option>${m}</option>`).join("")}</select></div>
          <div class="field"><label>Operator</label><select class="a-op">${OPS.map(o=>`<option>${o}</option>`).join("")}</select></div>
          <div class="field"><label>Schwelle</label><input class="a-threshold" type="number" step="0.1"></div>
          <div class="field"><label>Dauer (Sek)</label><input class="a-duration" type="number"></div>
          <div class="field"><label>Cooldown (Sek)</label><input class="a-cooldown" type="number"></div>
        </div>
        <div class="grid2" style="width:100%">
          <div class="field row"><label>→ Telegram</label><input class="a-telegram" type="checkbox"></div>
          <div class="field row"><label>→ Webhook</label><input class="a-webhook" type="checkbox"></div>
          <div class="field row"><label>→ E-Mail</label><input class="a-email" type="checkbox"></div>
          <div class="field row"><label>Popup/Beep</label><span><input class="a-popup" type="checkbox" title="Popup"> <input class="a-beep" type="checkbox" title="Beep"></span></div>
        </div>
        <div class="field"><label>Nachricht</label><input class="a-message" type="text"></div>
        <div class="section-actions" style="margin-top:8px">
          <button class="secondary small save-btn">💾 Speichern</button>
          <button class="danger small del-btn">✕ Löschen</button>
        </div>
      </div>
    </template>
  </section>`;
}

async function loadAlerts() {
  try {
    const r = await fetch("/api/alerts");
    const j = await r.json();
    alertRules = j.alerts || [];
    renderAlertList();
  } catch(e) { $("#alerts-list").innerHTML = `<p class="hint">Fehler: ${e.message}</p>`; }
}

function renderAlertList() {
  const list = $("#alerts-list");
  if (!alertRules.length) { list.innerHTML = '<p class="hint">Keine Regeln konfiguriert</p>'; return; }
  list.innerHTML = "";
  const tmpl = $("#alert-tmpl");
  alertRules.forEach((rule, idx) => {
    const node = tmpl.content.cloneNode(true);
    node.querySelector(".a-id").value = rule.rule_id || "";
    node.querySelector(".a-enabled").checked = !!rule.enabled;
    node.querySelector(".a-device").value = rule.device_key || "*";
    node.querySelector(".a-metric").value = rule.metric || "W";
    node.querySelector(".a-op").value = rule.op || ">";
    node.querySelector(".a-threshold").value = rule.threshold || 0;
    node.querySelector(".a-duration").value = rule.duration_seconds || 10;
    node.querySelector(".a-cooldown").value = rule.cooldown_seconds || 120;
    node.querySelector(".a-telegram").checked = !!rule.action_telegram;
    node.querySelector(".a-webhook").checked = !!rule.action_webhook;
    node.querySelector(".a-email").checked = !!rule.action_email;
    node.querySelector(".a-popup").checked = !!rule.action_popup;
    node.querySelector(".a-beep").checked = !!rule.action_beep;
    node.querySelector(".a-message").value = rule.message || "";
    const savBtn = node.querySelector(".save-btn");
    const delBtn = node.querySelector(".del-btn");
    savBtn.onclick = () => saveAlertRow(savBtn.closest(".devcard"), rule.rule_id);
    delBtn.onclick = () => deleteAlertRow(rule.rule_id);
    list.appendChild(node);
  });
}

function gatherAlertRow(row) {
  return {
    rule_id: row.querySelector(".a-id").value.trim(),
    enabled: row.querySelector(".a-enabled").checked,
    device_key: row.querySelector(".a-device").value,
    metric: row.querySelector(".a-metric").value,
    op: row.querySelector(".a-op").value,
    threshold: Number(row.querySelector(".a-threshold").value) || 0,
    duration_seconds: Number(row.querySelector(".a-duration").value) || 10,
    cooldown_seconds: Number(row.querySelector(".a-cooldown").value) || 120,
    action_telegram: row.querySelector(".a-telegram").checked,
    action_webhook: row.querySelector(".a-webhook").checked,
    action_email: row.querySelector(".a-email").checked,
    action_popup: row.querySelector(".a-popup").checked,
    action_beep: row.querySelector(".a-beep").checked,
    message: row.querySelector(".a-message").value,
  };
}

async function saveAlertRow(row, rowId) {
  const data = gatherAlertRow(row);
  const r = await fetch("/api/alerts/" + encodeURIComponent(rowId),
    {method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
  const j = await r.json();
  if (j.ok) { toast("✓ Gespeichert"); loadAlerts(); }
  else toast("Fehler: "+j.error, "error");
}

async function addAlertRule() {
  const r = await fetch("/api/alerts",{method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({enabled:true,device_key:"*",metric:"W",op:">",threshold:1000,duration_seconds:10,message:"Hohe Last"})});
  const j = await r.json();
  if (j.ok) { toast("✓ Regel erstellt"); loadAlerts(); }
  else toast("Fehler: "+j.error, "error");
}

async function deleteAlertRow(ruleId) {
  if (!confirm("Regel \""+ruleId+"\" löschen?")) return;
  const r = await fetch("/api/alerts/" + encodeURIComponent(ruleId), {method:"DELETE"});
  const j = await r.json();
  if (j.ok) { toast("✓ Gelöscht"); loadAlerts(); }
  else toast("Fehler: "+j.error, "error");
}

async function triggerFirmwareUpdate(key, name) {
  if (!confirm(`Firmware-Update für "${name}" starten?\n\nDas Gerät wird automatisch neu gestartet.`)) return;
  toast("⏳ Starte Update für " + name + "…");
  try {
    const r = await fetch("/api/health/" + encodeURIComponent(key) + "/update", {method:"POST"});
    const j = await r.json();
    if (j.ok) {
      toast("✓ Update gestartet für " + name);
      setTimeout(runHealthCheck, 30000); // Re-check after 30s
    } else {
      toast("Fehler: " + j.error, "error");
    }
  } catch(e) { toast("Fehler: " + e.message, "error"); }
}

async function updateAllWithPendingFirmware() {
  const el = $("#health-results");
  const r = await fetch("/api/health");
  const j = await r.json();
  if (!j.ok) return;
  const pending = j.devices.filter(d => d.online && d.firmware_update_available);
  if (!pending.length) { toast("Keine Updates verfügbar"); return; }
  if (!confirm(`${pending.length} Gerät(e) haben Updates. Alle jetzt aktualisieren?`)) return;
  for (const d of pending) {
    toast("⏳ Update " + d.name + "…");
    await fetch("/api/health/" + encodeURIComponent(d.key) + "/update", {method:"POST"});
    await new Promise(r => setTimeout(r, 2000));
  }
  toast("✓ " + pending.length + " Update(s) gestartet");
  setTimeout(runHealthCheck, 30000);
}

async function runHealthCheck() {
  const el = $("#health-results");
  el.innerHTML = '<p class="hint">⏳ Pinge Geräte…</p>';
  try {
    const r = await fetch("/api/health");
    const j = await r.json();
    if (!j.ok) { el.innerHTML = `<p class="hint">Fehler</p>`; return; }
    const rows = j.devices.map(d => {
      const status = d.online ? '<span style="color:var(--ok)">● Online</span>' : '<span style="color:var(--danger)">● Offline</span>';
      const fw = d.firmware ? `<code style="font-size:.75rem">${d.firmware}</code>` : '<span class="hint">?</span>';
      const upd = d.firmware_update_available ? '<span style="color:var(--warn,#eab308);margin-left:6px">⬆ Update verfügbar</span>' : '';
      const lat = d.latency_ms != null ? `${d.latency_ms} ms` : '-';
      const upt = d.uptime_s != null ? Math.floor(d.uptime_s/3600)+' h' : '-';
      const err = d.error ? `<div class="hint" style="color:var(--danger)">${d.error}</div>` : '';
      const updBtn = (d.online && d.firmware_update_available)
        ? `<button class="small" style="background:#eab308" onclick="triggerFirmwareUpdate('${d.key}','${d.name.replace(/'/g,"&#39;")}')">⬆ Update starten</button>`
        : '';
      return `<div class="devcard">
        <div class="info">
          <h4>${d.name} <span class="hint" style="font-weight:400">(${d.host})</span></h4>
          <p>${status} · Latenz: ${lat} · Uptime: ${upt} · FW: ${fw}${upd}</p>
          ${err}
        </div>
        <div>${updBtn}</div>
      </div>`;
    }).join("");
    el.innerHTML = rows + `<p class="hint" style="margin-top:8px">Aktualisiert: ${new Date(j.ts*1000).toLocaleTimeString()}</p>`;
  } catch(e) { el.innerHTML = `<p class="hint">Fehler: ${e.message}</p>`; }
}

function renderNav() {
  const groups = {};
  SECTIONS.forEach(s=>{(groups[s.group]=groups[s.group]||[]).push(s)});
  let html = "";
  for (const [grp, secs] of Object.entries(groups)) {
    html += `<h3>${grp}</h3>`;
    html += secs.map(s=>`<a href="#sec-${s.id}">${s.title}</a>`).join("");
  }
  $("#nav").innerHTML = html;
}

function renderAll() {
  $("#main").innerHTML = SECTIONS.map(renderSection).join("");
  renderNav();
  // Fetch real app version
  fetch("/api/version").then(r=>r.json()).then(v=>{
    const el = $("#about-version");
    if (el) el.textContent = v.version || "?";
  }).catch(()=>{});
  // Load DB stats
  fetch("/api/data/stats").then(r=>r.json()).then(s=>{
    if (!s.ok) return;
    const el = $("#about-stats");
    if (el) el.innerHTML = `Datenbank: ${s.db_size_mb} MB · Samples: ${(s.samples_rows||0).toLocaleString()} · Stunden: ${(s.hourly_energy_rows||0).toLocaleString()}`;
  }).catch(()=>{});
  // Load alert rules
  loadAlerts();
}

async function discoverDevices() {
  const results = $("#discover-results");
  results.innerHTML = '<p class="hint">🔍 Scanne lokales Netzwerk…</p>';
  try {
    const r = await fetch("/api/devices/discover?timeout=5",{method:"POST"});
    const j = await r.json();
    if (!j.ok) { results.innerHTML = `<p class="hint">Fehler: ${j.error}</p>`; return; }
    if (!j.devices.length) { results.innerHTML = '<p class="hint">Keine Geräte gefunden</p>'; return; }
    results.innerHTML = j.devices.map(d=>`
      <div class="devcard">
        <div class="info"><h4>${d.name||d.host}</h4><p>${d.host} · ${d.kind} · ${d.model||""}</p></div>
        <button class="small" ${d.already_added?"disabled":""} onclick='addDiscovered(${JSON.stringify(d).replace(/'/g,"&#39;")})'>${d.already_added?"✓":"➕"}</button>
      </div>`).join("");
  } catch(e) { results.innerHTML = `<p class="hint">Fehler: ${e.message}</p>`; }
}

async function addDiscovered(dev) {
  const r = await fetch("/api/devices",{method:"POST",
    headers:{"Content-Type":"application/json"},body:JSON.stringify(dev)});
  const j = await r.json();
  if (j.ok) { toast("✓ Gerät hinzugefügt"); reload(); }
  else toast("Fehler: " + j.error, "error");
}

async function addByIp() {
  const ip = $("#probe-ip").value.trim();
  if (!ip) return;
  const r = await fetch("/api/devices",{method:"POST",
    headers:{"Content-Type":"application/json"},body:JSON.stringify({host:ip})});
  const j = await r.json();
  if (j.ok) { toast("✓ Gerät hinzugefügt"); $("#probe-ip").value=""; reload(); }
  else toast("Fehler: " + j.error, "error");
}

async function deleteDevice(key) {
  if (!confirm("Gerät "+key+" wirklich entfernen?")) return;
  const r = await fetch("/api/devices/"+encodeURIComponent(key),{method:"DELETE"});
  const j = await r.json();
  if (j.ok) { toast("✓ Gerät entfernt"); reload(); }
  else toast("Fehler: " + j.error, "error");
}

async function testConnection(which) {
  toast("Teste " + which + "…");
  const r = await fetch("/api/settings/test-"+which,{method:"POST"});
  const j = await r.json();
  if (j.ok) toast("✓ " + (j.message||"OK"));
  else toast("Fehler: " + j.error, "error");
}

async function reload() {
  try {
    const [cfgR, devR] = await Promise.all([
      fetch("/api/settings").then(r=>r.json()),
      fetch("/api/devices").then(r=>r.json()),
    ]);
    cfg = cfgR;
    devices = devR.devices || [];
    renderAll();
  } catch(e) {
    $("#main").innerHTML = '<p style="color:var(--danger)">Fehler beim Laden: '+e.message+'</p>';
  }
}

reload();
</script>
