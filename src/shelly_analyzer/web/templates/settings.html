<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Einstellungen – Shelly Energy Analyzer</title>
<style>
:root{--bg:#0b0f14;--card:#121821;--fg:#e8eef6;--muted:#9fb0c3;--accent:#6aa7ff;
--border:rgba(255,255,255,0.08);--danger:#ef4444;--ok:#22c55e;
--input-bg:rgba(255,255,255,.03);--hover-bg:rgba(106,167,255,.08);--active-bg:rgba(106,167,255,.15);
--card-inset:rgba(255,255,255,.03);--btn-sec-bg:rgba(255,255,255,.08)}
:root[data-theme="light"]{--bg:#f6f7fb;--card:#ffffff;--fg:#111827;--muted:#4b5563;--accent:#2563eb;
--border:rgba(17,24,39,0.12);--danger:#dc2626;--ok:#16a34a;
--input-bg:rgba(17,24,39,.03);--hover-bg:rgba(37,99,235,.08);--active-bg:rgba(37,99,235,.12);
--card-inset:rgba(17,24,39,.03);--btn-sec-bg:rgba(17,24,39,.06)}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
background:var(--bg);color:var(--fg);line-height:1.45;font-size:14px}
a{color:var(--accent);text-decoration:none}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--card);
border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
header h1{font-size:1rem;margin:0;flex:1;font-weight:600}
.layout{display:flex;min-height:calc(100vh - 50px)}
.sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);
padding:12px 0;overflow-y:auto;position:sticky;top:50px;max-height:calc(100vh - 50px);flex-shrink:0}
.sidebar h3{font-size:.7rem;text-transform:uppercase;color:var(--muted);
padding:8px 16px 4px;margin:0;letter-spacing:.05em}
.sidebar a{display:block;padding:7px 16px;color:var(--fg);font-size:.88rem;border-left:3px solid transparent}
.sidebar a:hover{background:var(--hover-bg)}
.sidebar a.active{background:var(--active-bg);border-left-color:var(--accent);color:var(--accent)}
main{flex:1;padding:20px;max-width:900px;min-width:0}
section{margin-bottom:30px;background:var(--card);border:1px solid var(--border);
border-radius:12px;padding:16px 20px;scroll-margin-top:60px}
section h2{margin:0 0 14px;font-size:1.05rem;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:8px}
.field{margin-bottom:0;display:flex;flex-direction:column;gap:4px;min-height:58px;justify-content:flex-start}
.field.row{flex-direction:row;align-items:center;justify-content:space-between;gap:10px;
padding:8px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;
min-height:42px;cursor:pointer;transition:background .1s}
.field.row:hover{background:var(--hover-bg)}
.field label{font-size:.82rem;color:var(--muted);font-weight:500}
.field.row label,.field.row>span{flex:1;margin:0;cursor:pointer;color:var(--fg);font-size:.88rem;font-weight:400}
input[type="text"],input[type="password"],input[type="number"],input[type="email"],input[type="url"],select,textarea{
padding:8px 10px;border:1px solid var(--border);background:var(--input-bg);
color:var(--fg);border-radius:6px;font-size:.88rem;font-family:inherit;width:100%}
textarea{resize:vertical;min-height:60px;font-family:ui-monospace,monospace}
input[type="checkbox"]{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);flex-shrink:0;margin:0}
select{cursor:pointer}
button{padding:8px 14px;border:none;background:var(--accent);color:#fff;border-radius:6px;
cursor:pointer;font-size:.88rem;font-weight:500}
button:hover{opacity:.9}
button.secondary{background:var(--btn-sec-bg);color:var(--fg)}
button.danger{background:var(--danger)}
button.small{padding:4px 8px;font-size:.78rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;align-items:start}
.section-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;
padding-top:12px;border-top:1px solid var(--border)}
.hint{font-size:.75rem;color:var(--muted);margin-top:2px}
.list-field{display:flex;flex-direction:column;gap:8px;min-height:0!important}
.list-container{display:flex;flex-direction:column;gap:8px}
.list-item{background:var(--card-inset);border:1px solid var(--border);border-radius:8px;padding:10px 12px;transition:transform .15s,opacity .15s,border-color .15s}
.list-item.dragging{opacity:.45}
.list-item.drop-before{border-top:2px solid var(--accent)}
.list-item.drop-after{border-bottom:2px solid var(--accent)}
.drag-handle:active{cursor:grabbing}
.list-item-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.list-item-title{font-size:.85rem;font-weight:600;color:var(--fg)}
.list-item-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.list-item-grid .field{min-height:0;margin:0}
.list-item-grid .field label{font-size:.72rem}
@media(max-width:760px){.list-item-grid{grid-template-columns:1fr}}
.devcard{background:var(--card-inset);border:1px solid var(--border);border-radius:8px;
padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.devcard .info{flex:1}
.devcard h4{margin:0 0 2px;font-size:.95rem}
.devcard p{margin:0;font-size:.78rem;color:var(--muted)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#888;margin-right:4px}
.dot.online{background:var(--ok)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);
padding:10px 14px;border-radius:8px;font-size:.85rem;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.4);
opacity:0;transform:translateY(10px);transition:all .2s}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-color:var(--danger)}
.toast.success{border-color:var(--ok)}
@media(max-width:760px){
.layout{flex-direction:column}
.sidebar{width:100%;position:sticky;top:50px;max-height:none;display:flex;flex-wrap:nowrap;
padding:6px 8px;overflow-x:auto;overflow-y:hidden;gap:4px;z-index:40;scrollbar-width:thin;
border-right:none;border-bottom:1px solid var(--border)}
.sidebar::-webkit-scrollbar{height:4px}
.sidebar h3{display:none}
.sidebar a{border-left:none;border-bottom:2px solid transparent;padding:6px 12px;
white-space:nowrap;font-size:.82rem;flex-shrink:0;border-radius:4px}
.sidebar a.active{border-left:none;border-bottom-color:var(--accent);background:var(--active-bg)}
.grid2{grid-template-columns:1fr}
main{padding:12px}
section{padding:14px}
}
</style>
</head>
<body>
<script>
(function(){
  try {
    var th = localStorage.getItem('sea_theme');
    if (!th) th = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    document.documentElement.dataset.theme = th;
  } catch(e) {}
})();
</script>
<header>
  <h1 id="page-title">⚙ Einstellungen</h1>
  <a href="/" id="nav-back">← Dashboard</a>
</header>
<div class="layout">
<nav class="sidebar" id="nav"></nav>
<main id="main"></main>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (s,p=document)=>p.querySelector(s);
const $$ = (s,p=document)=>p.querySelectorAll(s);
const LANGS = {de:"Deutsch",en:"English",es:"Español",fr:"Français",pt:"Português",it:"Italiano",pl:"Polski",cs:"Čeština",ru:"Русский"};

let cfg = {};
let devices = [];
let I18N = {};
// Populated once per page load from /api/zones. Each entry is a list of
// [value, label] pairs; the *_grouped variants are lists of
// [group-name, [[value, label], ...]] for <optgroup> rendering.
let ZONES = {
  spot_energy_charts: [], spot_awattar: [], spot_aemo: [], spot_eia: [],
  spot_grouped: [], co2: [], co2_grouped: [],
};
// Return either a flat [[k,v],...] list or a grouped
// [[groupName, [[k,v],...]], ...] list — the renderer detects the shape.
function _dynOpts(f) {
  if (!f || !f.dynSrc) return [];
  if (f.dynSrc === "co2") {
    if (ZONES.co2_grouped && ZONES.co2_grouped.length) return ZONES.co2_grouped;
    return ZONES.co2 || [];
  }
  if (f.dynSrc === "spot") {
    // aWATTar is a special case: if the user explicitly picked aWATTar,
    // only show DE/AT; otherwise show the full grouped global list so
    // they can also pick US / AU zones.
    const api = (cfg && cfg.spot_price && cfg.spot_price.primary_api) || "energy_charts";
    if (api === "awattar") return ZONES.spot_awattar || [];
    if (ZONES.spot_grouped && ZONES.spot_grouped.length) return ZONES.spot_grouped;
    return ZONES.spot_energy_charts || [];
  }
  return [];
}
// Detect whether an options list is grouped ([[name,[[k,v],...]], ...])
// or flat ([[k,v],...]). Grouped lists have nested arrays at index 1.
function _isGroupedOpts(opts) {
  return opts && opts.length > 0 && Array.isArray(opts[0]) && Array.isArray(opts[0][1])
    && opts[0][1].length > 0 && Array.isArray(opts[0][1][0]);
}
// t(key, fallback) – looks up in I18N, falls back to the German literal if missing.
// This lets the page stay fully German-out-of-the-box and progressively add translations.
function T(key, fallback, vars) {
  let s = (I18N && I18N[key]) ? I18N[key] : fallback;
  if (vars) Object.keys(vars).forEach(function(k){ s = s.split('{'+k+'}').join(String(vars[k])); });
  return s;
}

function toast(msg, kind="success") {
  const el = $("#toast");
  el.textContent = msg;
  el.className = "toast show " + kind;
  setTimeout(()=>el.className="toast",2500);
}

function get(obj, path, def="") {
  return path.split(".").reduce((o,k)=> (o && o[k]!==undefined) ? o[k] : def, obj);
}
function setPath(obj, path, val) {
  const parts = path.split(".");
  const last = parts.pop();
  let o = obj;
  for (const k of parts) { if (!o[k]) o[k]={}; o=o[k]; }
  o[last] = val;
}

function gatherListField(container) {
  const items = [];
  $$('.list-item', container).forEach(itemEl => {
    const obj = {};
    $$('[data-k]', itemEl).forEach(inp => {
      const k = inp.dataset.k;
      let v;
      if (inp.type === "checkbox") v = inp.checked;
      else if (inp.type === "number") v = inp.value === "" ? 0 : Number(inp.value);
      else if (inp.dataset.csv === "1") {
        v = String(inp.value||"").split(",").map(s=>s.trim()).filter(Boolean);
      }
      else v = inp.value;
      obj[k] = v;
    });
    items.push(obj);
  });
  return items;
}
function gatherSection(sectionId) {
  const sec = $("#sec-"+sectionId);
  if (!sec) return {};
  const data = {};
  // First: collect list fields (they wrap multiple inputs)
  $$('.list-field[data-list="1"]', sec).forEach(fld => {
    const key = fld.dataset.key;
    setPath(data, key, gatherListField(fld));
  });
  // Then: simple fields with data-key (skip those inside lists)
  $$('[data-key]',sec).forEach(inp=>{
    if (inp.closest('.list-field[data-list="1"]')) return;
    const key = inp.dataset.key;
    let val;
    if (inp.type === "checkbox") val = inp.checked;
    else if (inp.type === "number") val = inp.value === "" ? 0 : Number(inp.value);
    else val = inp.value;
    setPath(data, key, val);
  });
  return data;
}

async function saveSection(sectionId) {
  let data;
  try { data = gatherSection(sectionId); }
  catch(e) { toast(T("settings.toast.error","Fehler: {err}",{err:e.message}), "error"); return; }
  // When pricing section sets tariff_type, auto-toggle spot_price.enabled
  if (sectionId === "pricing" && data.spot_price && data.spot_price.tariff_type) {
    if (!data.spot_price) data.spot_price = {};
    data.spot_price.enabled = data.spot_price.tariff_type === "dynamic";
  }
  // Detect language change so we can hard-reload the page afterwards —
  // the i18n map on the client is only fetched once on initial load, so a
  // language switch otherwise leaves the UI in the old language until the
  // user manually refreshes.
  const langChanging = (
    sectionId === "ui"
    && data.ui
    && typeof data.ui.language === "string"
    && cfg && cfg.ui
    && data.ui.language !== cfg.ui.language
  );
  try {
    const r = await fetch("/api/settings",{method:"PUT",
      headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
    const j = await r.json();
    if (j.ok) {
      toast(T("settings.toast.saved","✓ Gespeichert"));
      if (langChanging) {
        // Give the toast a beat, then hard-reload so /api/i18n returns the
        // new language and every label on the page re-renders with it.
        setTimeout(function(){ window.location.reload(); }, 350);
        return;
      }
      // Re-fetch server-side config + re-render the section so the UI matches
      // what the server actually persisted (verifies the write round-trip
      // visually; if a value "jumps back", you know the server rejected it).
      try {
        const fresh = await fetch("/api/settings").then(x=>x.json());
        cfg = fresh;
        const secEl = document.getElementById("sec-" + sectionId);
        const s = SECTIONS.find(x => x.id === sectionId);
        if (secEl && s && !s.custom) {
          const fieldsHtml = (s.fields||[]).map(renderField).join("");
          const grid = secEl.querySelector(".grid2");
          if (grid) { grid.innerHTML = fieldsHtml; wireListEvents(grid); }
        }
      } catch(e) {}
    }
    else toast(T("settings.toast.error","Fehler: {err}",{err:j.error}), "error");
  } catch(e) { toast(T("settings.toast.error","Fehler: {err}",{err:e.message}), "error"); }
}

const SECTIONS = [
  {id:"devices", title:"Geräte", group:"Grundeinstellungen", custom:true},
  {id:"health", title:"Health Check", group:"Grundeinstellungen", custom:true},
  {id:"ui", title:"Anzeige", group:"Grundeinstellungen", fields:[
    {key:"ui.language", label:"Sprache", type:"select", opts:Object.entries(LANGS)},
    {key:"ui.theme", label:"Theme", type:"select", opts:[["auto","Auto"],["light","Hell"],["dark","Dunkel"]]},
    {key:"ui.plot_theme_mode", label:"Plot-Theme", type:"select", opts:[["auto","Auto"],["day","Tag"],["night","Nacht"]]},
    {key:"ui.live_poll_seconds", label:"Live Polling (Sek)", type:"number", step:"0.1"},
    {key:"ui.plot_redraw_seconds", label:"Plot Refresh (Sek)", type:"number", step:"0.1"},
    {key:"ui.live_window_minutes", label:"Live-Fenster (Min)", type:"number"},
    {key:"ui.live_retention_minutes", label:"Live Retention (Min)", type:"number"},
    {key:"ui.live_smoothing_enabled", label:"Glättung aktiv", type:"checkbox"},
    {key:"ui.live_smoothing_seconds", label:"Glättung (Sek)", type:"number"},
    {key:"ui.live_day_start", label:"Tag-Start (HH:MM)", type:"text"},
    {key:"ui.live_night_start", label:"Nacht-Start (HH:MM)", type:"text"},
    {key:"ui.live_daynight_mode", label:"Tag/Nacht-Modus", type:"select", opts:[["all","Alle"],["day","Tag"],["night","Nacht"]]},
  ]},
  {id:"web", title:"Web-Server", group:"Grundeinstellungen", fields:[
    {key:"ui.live_web_enabled", label:"Web-Dashboard aktiv", type:"checkbox"},
    {key:"ui.live_web_port", label:"Port", type:"number"},
    {key:"ui.live_web_refresh_seconds", label:"Refresh (Sek)", type:"number", step:"0.1"},
    {key:"ui.live_web_token", label:"Zugriffs-Token", type:"password", hint:"Leer = kein Login nötig"},
    {key:"ui.widget_domain", label:"Widget Domain", type:"text", hint:"Für iOS Widget"},
    {key:"ui.widget_devices", label:"Widget Geräte", type:"text", hint:"Komma-separiert"},
  ]},
  {id:"ssl", title:"SSL-Zertifikat", group:"Grundeinstellungen", custom:true},
  {id:"pricing", title:"Preise & Tarif", group:"Grundeinstellungen", fields:[
    {key:"spot_price.tariff_type", label:"Tarif-Modell", type:"select", opts:[["fixed","Fester Tarif"],["dynamic","Dynamischer Tarif (Spot)"]], hint:"Fix = fester Strompreis, Dynamisch = stündliche Börsenpreise"},
    {key:"pricing.electricity_price_eur_per_kwh", label:"Strompreis €/kWh", type:"number", step:"0.0001", hint:"Bei festem Tarif: dein Vertragspreis"},
    {key:"pricing.base_fee_eur_per_year", label:"Grundgebühr €/Jahr", type:"number", step:"0.01"},
    {key:"pricing.price_includes_vat", label:"Preis inkl. MwSt.", type:"checkbox"},
    {key:"pricing.base_fee_includes_vat", label:"Grundgebühr inkl. MwSt.", type:"checkbox"},
    {key:"pricing.vat_enabled", label:"MwSt. aktiv", type:"checkbox"},
    {key:"pricing.vat_rate_percent", label:"MwSt.-Satz (%)", type:"number", step:"0.1"},
    {key:"pricing.co2_intensity_g_per_kwh", label:"CO₂-Intensität (g/kWh)", type:"number"},
    {key:"pricing.tariff_schedule", label:"Preisänderungen", type:"list", itemLabel:"Tarifperiode", hint:"Ab Startdatum gilt der neue Preis. Ältere Daten behalten den vorherigen Preis.", schema:[
      {key:"start_date", label:"Ab Datum", type:"date"},
      {key:"electricity_price_eur_per_kwh", label:"Strompreis €/kWh", type:"number", step:"0.0001"},
      {key:"base_fee_eur_per_year", label:"Grundgebühr €/Jahr", type:"number", step:"0.01"},
    ], defaults:{start_date:"",electricity_price_eur_per_kwh:0.3265,base_fee_eur_per_year:127.51}},
  ]},
  {id:"tou", title:"TOU (Zeittarife)", group:"Grundeinstellungen", fields:[
    {key:"tou.enabled", label:"TOU-Tarif aktiv", type:"checkbox"},
    {key:"tou.rates", label:"Zeitperioden", type:"list", itemLabel:"Tarif", schema:[
      {key:"name", label:"Name", type:"text", placeholder:"HT / NT"},
      {key:"price_eur_per_kwh", label:"Preis €/kWh", type:"number", step:"0.0001"},
      {key:"start_hour", label:"Start (Std)", type:"number", min:0, max:23},
      {key:"end_hour", label:"Ende (Std)", type:"number", min:0, max:23},
      {key:"weekdays_only", label:"Nur Werktags", type:"checkbox"},
    ], defaults:{name:"HT",price_eur_per_kwh:0.30,start_hour:6,end_hour:22,weekdays_only:false}},
  ]},
  {id:"autosync", title:"Auto-Sync", group:"Grundeinstellungen", fields:[
    {key:"ui.autosync_enabled", label:"Auto-Sync aktiv", type:"checkbox"},
    {key:"ui.autosync_interval_hours", label:"Intervall (Std)", type:"number"},
    {key:"ui.autosync_interval_minutes", label:"Intervall (Min, überschreibt Std wenn > 0)", type:"number"},
    {key:"ui.autosync_mode", label:"Modus", type:"select", opts:[["incremental","Inkrementell"],["all","Alle"],["day","Tag"],["week","Woche"],["month","Monat"]]},
  ]},

  {id:"telegram", title:"Telegram", group:"Benachrichtigungen", testBtn:"telegram", fields:[
    {key:"ui.telegram_enabled", label:"Telegram aktiv", type:"checkbox"},
    {key:"ui.telegram_bot_token", label:"Bot Token", type:"password"},
    {key:"ui.telegram_chat_id", label:"Chat ID", type:"text"},
    {key:"ui.telegram_verify_ssl", label:"SSL verifizieren", type:"checkbox"},
    {key:"ui.telegram_detail_level", label:"Detail", type:"select", opts:[["simple","Kurz"],["detailed","Ausführlich"]]},
    {key:"ui.telegram_alarm_plots_enabled", label:"Alarm-Plots", type:"checkbox"},
    {key:"ui.telegram_daily_summary_enabled", label:"Tages-Report", type:"checkbox"},
    {key:"ui.telegram_daily_summary_time", label:"Tages-Zeit", type:"text"},
    {key:"ui.telegram_monthly_summary_enabled", label:"Monats-Report", type:"checkbox"},
    {key:"ui.telegram_monthly_summary_time", label:"Monats-Zeit", type:"text"},
    {key:"ui.telegram_summary_load_w", label:"Load-Schwelle (W)", type:"number"},
  ]},
  {id:"email", title:"E-Mail", group:"Benachrichtigungen", fields:[
    {key:"ui.email_enabled", label:"E-Mail aktiv", type:"checkbox"},
    {key:"ui.email_smtp_server", label:"SMTP Server", type:"text"},
    {key:"ui.email_smtp_port", label:"SMTP Port", type:"number"},
    {key:"ui.email_smtp_user", label:"SMTP User", type:"text"},
    {key:"ui.email_smtp_password", label:"SMTP Passwort", type:"password"},
    {key:"ui.email_from_address", label:"Absender", type:"email"},
    {key:"ui.email_use_tls", label:"TLS verwenden", type:"checkbox"},
    {key:"ui.email_recipients", label:"Empfänger", type:"text", hint:"Komma-separiert"},
    {key:"ui.email_alarm_enabled", label:"Alarm-E-Mails", type:"checkbox"},
    {key:"ui.email_daily_summary_enabled", label:"Tages-Report", type:"checkbox"},
    {key:"ui.email_daily_summary_time", label:"Tages-Zeit", type:"text"},
    {key:"ui.email_monthly_summary_enabled", label:"Monats-Report", type:"checkbox"},
    {key:"ui.email_monthly_summary_time", label:"Monats-Zeit", type:"text"},
    {key:"ui.email_monthly_invoice_enabled", label:"Monats-Rechnung", type:"checkbox"},
  ]},
  {id:"webhook", title:"Webhook", group:"Benachrichtigungen", fields:[
    {key:"ui.webhook_enabled", label:"Webhook aktiv", type:"checkbox"},
    {key:"ui.webhook_url", label:"URL", type:"url"},
    {key:"ui.webhook_custom_headers", label:"Custom Headers (JSON)", type:"textarea"},
    {key:"ui.webhook_alarm_enabled", label:"Alarm", type:"checkbox"},
    {key:"ui.webhook_daily_summary_enabled", label:"Tages-Report", type:"checkbox"},
    {key:"ui.webhook_monthly_summary_enabled", label:"Monats-Report", type:"checkbox"},
  ]},
  {id:"alerts", title:"Alarm-Regeln", group:"Benachrichtigungen", custom:true},
  {id:"anomaly", title:"Anomalien", group:"Benachrichtigungen", fields:[
    {key:"anomaly.enabled", label:"Anomalie-Erkennung aktiv", type:"checkbox"},
    {key:"anomaly.sigma_threshold", label:"Sigma-Schwelle", type:"number", step:"0.1"},
    {key:"anomaly.min_deviation_kwh", label:"Min Abweichung (kWh)", type:"number", step:"0.01"},
    {key:"anomaly.window_days", label:"Fenster (Tage)", type:"number"},
    {key:"anomaly.check_unusual_daily", label:"Tages-Check", type:"checkbox"},
    {key:"anomaly.check_night_consumption", label:"Nacht-Check", type:"checkbox"},
    {key:"anomaly.check_power_peak_time", label:"Peak-Zeit-Check", type:"checkbox"},
    {key:"anomaly.auto_interval_minutes", label:"Auto-Intervall (Min)", type:"number"},
    {key:"anomaly.max_history", label:"Max Historie", type:"number"},

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function renderListField(f, val) {
  const items = Array.isArray(val) ? val : [];
  const listId = "list-" + f.key.replace(/\./g,"_");
  function renderSubInput(sf, itemVal) {
    const v = itemVal == null ? "" : itemVal;
    if (sf.type === "checkbox") {
      return `<label class="field row" style="min-height:38px;padding:6px 10px"><span>${esc(sf.label)}</span><input type="checkbox" data-k="${sf.key}" ${v?"checked":""}></label>`;
    }
    if (sf.type === "select") {
      const options = (sf.opts||[]).map(([k,lbl])=>`<option value="${esc(k)}" ${String(k)===String(v)?"selected":""}>${esc(lbl)}</option>`).join("");
      return `<div class="field"><label>${esc(sf.label)}</label><select data-k="${sf.key}">${options}</select></div>`;
    }
    if (sf.type === "select-device") {
      const opts = [["","(keine)"]].concat(devices.map(d=>[d.key, d.name+" ("+d.key+")"]));
      const options = opts.map(([k,lbl])=>`<option value="${esc(k)}" ${String(k)===String(v)?"selected":""}>${esc(lbl)}</option>`).join("");
      return `<div class="field"><label>${esc(sf.label)}</label><select data-k="${sf.key}">${options}</select></div>`;
    }
    if (sf.type === "csv-list") {
      const s = Array.isArray(v) ? v.join(", ") : String(v||"");
      return `<div class="field"><label>${esc(sf.label)}</label><input type="text" data-k="${sf.key}" data-csv="1" value="${esc(s)}"></div>`;
    }
    const step = sf.step ? `step="${sf.step}"` : "";
    const minA = sf.min!=null ? `min="${sf.min}"` : "";
    const maxA = sf.max!=null ? `max="${sf.max}"` : "";
    const ph = sf.placeholder ? `placeholder="${esc(sf.placeholder)}"` : "";
    const tp = sf.type === "number" ? "number" : "text";
    return `<div class="field"><label>${esc(sf.label)}</label><input type="${tp}" ${step} ${minA} ${maxA} ${ph} data-k="${sf.key}" value="${esc(v)}"></div>`;
  }
  function renderItem(item, idx) {
    const title = (item && (item.name || item.tenant_id || item.tenant_id)) || (f.itemLabel||"Eintrag") + " " + (idx+1);
    const rows = f.schema.map(sf => renderSubInput(sf, item ? item[sf.key] : undefined)).join("");
    return `<div class="list-item" data-idx="${idx}">
      <div class="list-item-hdr">
        <span class="list-item-title">${esc(title)}</span>
        <button type="button" class="small danger list-item-del" title="Entfernen">✕</button>
      </div>
      <div class="list-item-grid">${rows}</div>
    </div>`;
  }
  const itemsHtml = items.map(renderItem).join("") || `<p class="hint" style="margin:6px 0">Keine Einträge – ➕ Hinzufügen drücken.</p>`;
  return `<div class="field list-field" style="grid-column:1/-1" data-key="${f.key}" data-list="1">
    <label>${esc(tField(f))}</label>
    <div id="${listId}" class="list-container">${itemsHtml}</div>
    <div><button type="button" class="secondary small list-add">➕ Hinzufügen</button></div>
    ${f.hint ? `<div class="hint">${esc(f.hint)}</div>`:""}
    <template class="list-schema">${encodeURIComponent(JSON.stringify({schema:f.schema, defaults:f.defaults||{}, itemLabel:f.itemLabel||"Eintrag"}))}</template>
  </div>`;
}
function tField(f) { return T("settings.field."+f.key, f.label); }
function renderField(f) {
  const val = get(cfg, f.key, "");
  const label = tField(f);
  let input;
  if (f.type === "checkbox") {
    input = `<input type="checkbox" data-key="${f.key}" ${val?"checked":""}>`;
    return `<label class="field row"><span>${label}</span>${input}</label>`;
  }
  if (f.type === "select" || f.type === "select-device" || f.type === "select-dyn") {
    let opts = f.opts || [];
    if (f.type === "select-device") {
      opts = [["","(keine)"]].concat(devices.map(d=>[d.key, d.name+" ("+d.key+")"]));
    } else if (f.type === "select-dyn") {
      opts = _dynOpts(f) || [];
    }
    // Grouped options: emit <optgroup> elements. Preserve the
    // "current value not in list" fallback at the top.
    if (_isGroupedOpts(opts)) {
      const allFlat = [];
      opts.forEach(g => { (g[1]||[]).forEach(kv => allFlat.push(kv)); });
      const haveVal = allFlat.some(([k,_]) => String(k) === String(val));
      let optionsHtml = "";
      if (!haveVal && val !== "" && val != null) {
        optionsHtml += `<option value="${esc(val)}" selected>(${esc(val)})</option>`;
      }
      opts.forEach(g => {
        const gName = g[0] || "";
        const gOpts = g[1] || [];
        optionsHtml += `<optgroup label="${esc(gName)}">`;
        gOpts.forEach(([k,v]) => {
          const sel = String(k) === String(val) ? "selected" : "";
          optionsHtml += `<option value="${esc(k)}" ${sel}>${esc(v)}</option>`;
        });
        optionsHtml += `</optgroup>`;
      });
      input = `<select data-key="${f.key}">${optionsHtml}</select>`;
    } else {
      // Flat list — unchanged behavior.
      const haveVal = opts.some(([k,_]) => String(k) === String(val));
      if (!haveVal && val !== "" && val != null) {
        opts = [[val, "(" + String(val) + ")"]].concat(opts);
      }
      const options = opts.map(([k,v])=>`<option value="${k}" ${String(k)===String(val)?"selected":""}>${v}</option>`).join("");
      input = `<select data-key="${f.key}">${options}</select>`;
    }
  } else if (f.type === "textarea") {
    input = `<textarea data-key="${f.key}">${(val===null||val===undefined)?"":String(val)}</textarea>`;
  } else if (f.type === "list") {
    return renderListField(f, val);
  } else {
    const step = f.step ? `step="${f.step}"` : "";
    const tp = f.type === "password" ? "password" : f.type === "number" ? "number" : (f.type === "email"?"email":(f.type==="url"?"url":"text"));
    input = `<input type="${tp}" ${step} data-key="${f.key}" value="${val===null||val===undefined?"":String(val).replace(/"/g,"&quot;")}">`;
  }
  const hint = f.hint ? `<div class="hint">${f.hint}</div>` : "";
  return `<div class="field"><label>${label}</label>${input}${hint}</div>`;
}

function renderSection(s) {
  if (s.custom) {
    if (s.id === "devices") return renderDevices();
    if (s.id === "about") return renderAbout();
    if (s.id === "health") return renderHealth();
    if (s.id === "alerts") return renderAlerts();
    if (s.id === "updates") return renderUpdates();
    if (s.id === "ssl") return renderSSL();
    if (s.id === "ios_widget") return renderIosWidget();
  }
  const fieldsHtml = (s.fields||[]).map(renderField).join("");
  const hint = s.hint ? `<div class="hint" style="margin-bottom:10px">${s.hint}</div>` : "";
  const testBtn = s.testBtn ? `<button class="secondary" onclick="testConnection('${s.testBtn}')">${T("settings.btn.test","🔌 Test")}</button>` : "";

function _loadDevOrder() {
  try {
    const o = JSON.parse(localStorage.getItem("device_order") || "[]");
    return Array.isArray(o) ? o : [];
  } catch(e) { return []; }
}
function _saveDevOrder(order) {
  try { localStorage.setItem("device_order", JSON.stringify(order)); } catch(e) {}
}
function _loadHiddenDevs() {
  try {
    const o = JSON.parse(localStorage.getItem("hidden_devices") || "[]");
    return Array.isArray(o) ? o : [];
  } catch(e) { return []; }
}
function _saveHiddenDevs(arr) {
  try { localStorage.setItem("hidden_devices", JSON.stringify(arr)); } catch(e) {}
}

function _orderedDevices(devs) {
  const order = _loadDevOrder();
  if (!order.length) return devs.slice();
  const byKey = {};
  devs.forEach(function(d) { byKey[d.key] = d; });
  const out = [];
  order.forEach(function(k) { if (byKey[k]) { out.push(byKey[k]); delete byKey[k]; } });
  Object.keys(byKey).forEach(function(k) { out.push(byKey[k]); });
  return out;
}

function toggleDevHidden(key) {
  const hidden = _loadHiddenDevs();
  const i = hidden.indexOf(key);
  if (i === -1) hidden.push(key); else hidden.splice(i, 1);
  _saveHiddenDevs(hidden);
  toast(T("settings.devices.visibility_saved","Visibility updated (live tab)"), "success");
}

function _persistDevOrderFromDom() {
  const cards = document.querySelectorAll('#devices-list .list-item[data-devkey]');
  const order = Array.from(cards).map(function(c) { return c.dataset.devkey; });
  _saveDevOrder(order);
}

// Drag handlers wired per card on render
let _draggingKey = null;
function _onDragStart(e) {
  const card = e.currentTarget.closest('.list-item');
  if (!card) return;
  _draggingKey = card.dataset.devkey;
  e.dataTransfer.effectAllowed = 'move';
  card.classList.add('dragging');
}
function _onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const after = (e.clientY - rect.top) > rect.height / 2;
  card.classList.toggle('drop-after', after);
  card.classList.toggle('drop-before', !after);
}
function _onDragLeave(e) {
  e.currentTarget.classList.remove('drop-after','drop-before');
}
function _onDrop(e) {
  e.preventDefault();
  const target = e.currentTarget;
  target.classList.remove('drop-after','drop-before');
  if (!_draggingKey) return;
  const dragged = document.querySelector(`#devices-list .list-item[data-devkey="${CSS.escape(_draggingKey)}"]`);
  if (!dragged || dragged === target) { _draggingKey = null; return; }
  const rect = target.getBoundingClientRect();
  const after = (e.clientY - rect.top) > rect.height / 2;
  if (after) target.parentNode.insertBefore(dragged, target.nextSibling);
  else target.parentNode.insertBefore(dragged, target);
  _persistDevOrderFromDom();
  _draggingKey = null;
  toast(T("settings.devices.order_saved","Device order saved (live tab)"), "success");
}
function _onDragEnd(e) {
  e.currentTarget.closest('.list-item').classList.remove('dragging');
  document.querySelectorAll('#devices-list .list-item').forEach(function(c){
    c.classList.remove('drop-after','drop-before');
  });
}

function _wireDeviceDragHandlers() {
  document.querySelectorAll('#devices-list .drag-handle').forEach(function(h) {

async function saveDevice(key) {
  const card = document.querySelector(`.list-item[data-devkey="${CSS.escape(key)}"]`);
  if (!card) return;
  const body = {};
  card.querySelectorAll('[data-df]').forEach(inp=>{
    const k = inp.dataset.df;
    if (inp.type === "checkbox") body[k] = inp.checked;
    else if (inp.type === "number") body[k] = inp.value === "" ? 0 : Number(inp.value);
    else body[k] = inp.value;
  });
  try {
    const r = await fetch("/api/devices/"+encodeURIComponent(key),{method:"PUT",
      headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const j = await r.json();
    if (j.ok) { toast("✓ Gerät aktualisiert"); reload(); }
    else toast(T("settings.toast.error","Fehler: {err}",{err:j.error}), "error");
  } catch(e) { toast(T("settings.toast.error","Fehler: {err}",{err:e.message}), "error"); }
}

async function probeDevice(key) {
  const card = document.querySelector(`.list-item[data-devkey="${CSS.escape(key)}"]`);
  if (!card) return;
  const host = card.querySelector('[data-df="host"]').value;
  const username = card.querySelector('[data-df="username"]').value || "admin";
  let password = card.querySelector('[data-df="password"]').value || "";
  // Treat the masked placeholder as "use whatever's saved"
  if (password === "***") password = "";
  if (!host) { toast("Host/IP missing", "error"); return; }
  try {
    const r = await fetch("/api/devices/probe",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({host, username, password})});
    const j = await r.json();
    if (j.ok) { toast("✓ Reachable: " + (j.device.model||j.device.kind||"Shelly")); return; }
    if (j.error === "auth_required") {
      const pw = prompt("Device " + host + " is password-protected.\nEnter the admin password:");
      if (!pw) return;
      const r2 = await fetch("/api/devices/probe",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({host, username, password: pw})});
      const j2 = await r2.json();
      if (j2.ok) {
        // Cache the working password into the form so the user can hit Save
        const pwInp = card.querySelector('[data-df="password"]');
        if (pwInp) pwInp.value = pw;
        toast("✓ Authenticated: " + (j2.device.model||j2.device.kind||"Shelly")
              + " — click Save to persist");
      } else {
        toast("Auth failed: " + (j2.error||"unknown"), "error");
      }
      return;
    }
    toast("Not reachable: " + j.error, "error");
  } catch(e) { toast("Error: " + e.message, "error"); }
}

async function probeAllDevices() {
  toast("🔌 Probing all devices…");
  let ok=0, fail=0;
  for (const d of devices) {
    try {
      // Stored credentials live in config; the probe endpoint will only re-auth
      // when given fresh creds, so for the all-probe we just rely on the
      // device responding without auth (since the live poller already uses
      // its own cached credentials path).
      const r = await fetch("/api/devices/probe",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({host:d.host, username:d.username||"admin", password:""})});
      const j = await r.json();
      if (j.ok) ok++;
      else if (j.error === "auth_required" && d.has_password) ok++;  // already configured
      else fail++;
    } catch(e) { fail++; }
  }
  toast(`Probed: ${ok} ok, ${fail} failed`, fail?"error":"success");
  reload();
}

async function checkUpdateStatus() {
  const el = document.getElementById("updates-status");
  if (!el) return;
  el.textContent = T("settings.updates.status_loading","Status wird geladen…");
  try {
    const r = await fetch("/api/updates/status");
    const j = await r.json();
    if (!j.ok && !j.current) {
      el.innerHTML = `<span style="color:var(--danger)">${esc(j.error||"Fehler")}</span>`;
      return;
    }
    const cur = j.current || "?";
    if (!j.reachable) {
      el.innerHTML = `${T("settings.updates.current","Aktuelle Version")}: <strong>v${esc(cur)}</strong> · <span style="color:var(--muted)">${esc(j.status||T("settings.updates.offline","Offline"))}</span>`;
      return;
    }
    const latest = j.latest_tag || "?";
    if (j.has_update) {
      el.innerHTML = `${T("settings.updates.current","Aktuelle Version")}: <strong>v${esc(cur)}</strong> · ${T("settings.updates.latest","Neueste")}: <strong style="color:var(--ok,#22c55e)">${esc(latest)}</strong> · <button class="small" onclick='installVersion(${JSON.stringify(latest)},${JSON.stringify(j.asset_url||"")})'>⬆ ${T("settings.updates.install_latest","Auf neueste aktualisieren")}</button>`;
    } else {
      el.innerHTML = `${T("settings.updates.current","Aktuelle Version")}: <strong>v${esc(cur)}</strong> · ${T("settings.updates.up_to_date","Du bist auf dem neuesten Stand")} <span style="color:var(--ok,#22c55e)">✓</span>`;

function _sslDaysBadge(days) {
  if (days == null) return `<span class="hint">${T("settings.ssl.unknown","unbekannt")}</span>`;
  if (days < 0) return `<strong style="color:var(--danger,#ef4444)">${T("settings.ssl.expired","abgelaufen vor {n} Tagen",{n:-days})}</strong>`;
  if (days < 30) return `<strong style="color:var(--warn,#eab308)">${T("settings.ssl.expires_soon","läuft in {n} Tagen ab",{n:days})}</strong>`;
  return `<strong style="color:var(--ok,#22c55e)">${T("settings.ssl.valid_for","gültig für {n} Tage",{n:days})}</strong>`;
}

async function loadSSLStatus() {
  const el = document.getElementById("ssl-status");
  if (!el) return;
  el.textContent = T("settings.ssl.loading","Zertifikats-Status wird geladen…");
  try {
    const r = await fetch("/api/ssl/status");
    const j = await r.json();
    if (!j.ok) {
      el.innerHTML = `<span style="color:var(--danger)">${esc(j.error||"Fehler")}</span>`;
      return;
    }
    const c = j.cert || {};
    if (!c.exists) {
      el.innerHTML = `<span class="hint">${T("settings.ssl.none","Kein Zertifikat vorhanden (Modus: {m})",{m:j.mode})}</span>`;
      return;
    }
    if (c.error) {
      el.innerHTML = `<span style="color:var(--danger)">${esc(c.error)}</span>`;
      return;
    }
    const modeLabel = j.mode === "custom" ? T("settings.ssl.mode_custom","Eigenes Zertifikat")
      : j.mode === "off" ? T("settings.ssl.mode_off","HTTP (kein SSL)")
      : T("settings.ssl.mode_auto","Auto (self-signed)");
    const httpsBadge = j.is_https
      ? `<span style="color:var(--ok,#22c55e)">🔒 HTTPS aktiv</span>`
      : `<span style="color:var(--warn,#eab308)">⚠ HTTP (SSL inaktiv)</span>`;
    const typeBadge = c.is_self_signed
      ? `<span class="hint">${T("settings.ssl.self_signed","self-signed")}</span>`
      : `<span class="hint">${T("settings.ssl.ca_signed","CA-signiert")}</span>`;
    const willRenew = j.will_renew
      ? `<div style="margin-top:4px;color:var(--warn,#eab308)">♻ ${T("settings.ssl.will_renew_msg","Wird beim nächsten Start automatisch erneuert")}</div>`
      : "";
    const nb = c.not_before ? new Date(c.not_before).toLocaleDateString() : "?";
    const na = c.not_after ? new Date(c.not_after).toLocaleDateString() : "?";
    el.innerHTML = `
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:6px">
        ${httpsBadge} · <span>${T("settings.ssl.mode","SSL-Modus")}: <strong>${esc(modeLabel)}</strong></span> · ${typeBadge}
      </div>
      <div>${T("settings.ssl.validity","Gültigkeit")}: <strong>${esc(nb)}</strong> → <strong>${esc(na)}</strong> · ${_sslDaysBadge(c.days_remaining)}</div>
      <div style="margin-top:4px"><span class="hint">${T("settings.ssl.subject","Inhaber")}: ${esc(c.subject||"?")}</span></div>
      <div><span class="hint">${T("settings.ssl.issuer","Aussteller")}: ${esc(c.issuer||"?")}</span></div>
      ${c.sha256 ? `<div style="margin-top:4px;font-family:ui-monospace,monospace;font-size:.68rem;color:var(--muted);word-break:break-all">SHA-256: ${esc(c.sha256)}</div>` : ""}
      ${willRenew}`;
  } catch(e) {
    el.innerHTML = `<span style="color:var(--danger)">${esc(e.message)}</span>`;
  }
}

async function regenerateSSL() {
  if (!confirm(T("settings.ssl.confirm_regenerate","Zertifikat wirklich neu erzeugen? Der Browser zeigt danach eine Warnung (self-signed). Neustart der App nötig, damit es greift."))) return;
  toast("⏳ " + T("settings.ssl.regenerating","Erzeuge neues Zertifikat…"));
  try {
    const r = await fetch("/api/ssl/regenerate",{method:"POST"});
    const j = await r.json();
    if (j.ok) {
      toast("✓ " + (j.message||T("settings.ssl.regenerated","Zertifikat neu erzeugt – bitte App neu starten")));
      loadSSLStatus();
    } else {
      toast(T("settings.toast.error","Fehler: {err}",{err:j.error||"?"}), "error");
    }
  } catch(e) {
    toast(T("settings.toast.error","Fehler: {err}",{err:e.message}), "error");
  }
}

async function loadAlerts() {

function renderAlertList() {
  const list = $("#alerts-list");
  if (!alertRules.length) { list.innerHTML = '<p class="hint">Keine Regeln konfiguriert</p>'; return; }
  list.innerHTML = "";
  const tmpl = $("#alert-tmpl");
  alertRules.forEach((rule, idx) => {
    const node = tmpl.content.cloneNode(true);
    node.querySelector(".a-id").value = rule.rule_id || "";
    node.querySelector(".a-enabled").checked = !!rule.enabled;
    node.querySelector(".a-device").value = rule.device_key || "*";
    node.querySelector(".a-metric").value = rule.metric || "W";
    node.querySelector(".a-op").value = rule.op || ">";
    node.querySelector(".a-threshold").value = rule.threshold || 0;
    node.querySelector(".a-duration").value = rule.duration_seconds || 10;
    node.querySelector(".a-cooldown").value = rule.cooldown_seconds || 120;
    node.querySelector(".a-telegram").checked = !!rule.action_telegram;
    node.querySelector(".a-webhook").checked = !!rule.action_webhook;
    node.querySelector(".a-email").checked = !!rule.action_email;
    node.querySelector(".a-popup").checked = !!rule.action_popup;
    node.querySelector(".a-beep").checked = !!rule.action_beep;
    node.querySelector(".a-message").value = rule.message || "";
    const savBtn = node.querySelector(".save-btn");
    const delBtn = node.querySelector(".del-btn");
    savBtn.onclick = () => saveAlertRow(savBtn.closest(".devcard"), rule.rule_id);
    delBtn.onclick = () => deleteAlertRow(rule.rule_id);
    list.appendChild(node);
  });
}

function gatherAlertRow(row) {
  return {
    rule_id: row.querySelector(".a-id").value.trim(),
    enabled: row.querySelector(".a-enabled").checked,
    device_key: row.querySelector(".a-device").value,
    metric: row.querySelector(".a-metric").value,
    op: row.querySelector(".a-op").value,
    threshold: Number(row.querySelector(".a-threshold").value) || 0,
    duration_seconds: Number(row.querySelector(".a-duration").value) || 10,
    cooldown_seconds: Number(row.querySelector(".a-cooldown").value) || 120,

    action_webhook: row.querySelector(".a-webhook").checked,
    action_email: row.querySelector(".a-email").checked,
    action_popup: row.querySelector(".a-popup").checked,
    action_beep: row.querySelector(".a-beep").checked,

}

async function triggerFirmwareUpdate(key, name) {
  if (!confirm(`Firmware-Update für "${name}" starten?\n\nDas Gerät wird automatisch neu gestartet.`)) return;
  toast("⏳ Starte Update für " + name + "…");
  try {
    const r = await fetch("/api/health/" + encodeURIComponent(key) + "/update", {method:"POST"});
    const j = await r.json();
    if (j.ok) {
      toast("✓ "+T("settings.health.update_started","Update gestartet für {device}",{device:name}));
      setTimeout(runHealthCheck, 30000); // Re-check after 30s
    } else {
      toast(T("settings.toast.error","Fehler: {err}",{err:j.error}), "error");
    }
  } catch(e) { toast(T("settings.toast.error","Fehler: {err}",{err:e.message}), "error"); }
}

async function updateAllWithPendingFirmware() {
  const el = $("#health-results");
  const r = await fetch("/api/health");
  const j = await r.json();
  if (!j.ok) return;
  const pending = j.devices.filter(d => d.online && d.firmware_update_available);
  if (!pending.length) { toast("Keine Updates verfügbar"); return; }
  if (!confirm(`${pending.length} Gerät(e) haben Updates. Alle jetzt aktualisieren?`)) return;
  for (const d of pending) {
    toast("⏳ Update " + d.name + "…");
    await fetch("/api/health/" + encodeURIComponent(d.key) + "/update", {method:"POST"});
    await new Promise(r => setTimeout(r, 2000));
  }
  toast("✓ " + pending.length + " Update(s) gestartet");
  setTimeout(runHealthCheck, 30000);
}

async function runHealthCheck() {
  const el = $("#health-results");
  el.innerHTML = '<p class="hint">'+T("settings.health.pinging","⏳ Pinge Geräte…")+'</p>';
  try {
    const r = await fetch("/api/health");
    const j = await r.json();
    if (!j.ok) { el.innerHTML = `<p class="hint">${T("settings.health.error","Fehler")}</p>`; return; }
    const rows = j.devices.map(d => {
      const status = d.online ? '<span style="color:var(--ok)">● Online</span>' : '<span style="color:var(--danger)">● Offline</span>';
      const fw = d.firmware ? `<code style="font-size:.75rem">${d.firmware}</code>` : '<span class="hint">?</span>';
      const upd = d.firmware_update_available ? '<span style="color:var(--warn,#eab308);margin-left:6px">⬆ Update verfügbar</span>' : '';
      const lat = d.latency_ms != null ? `${d.latency_ms} ms` : '-';
      const upt = d.uptime_s != null ? Math.floor(d.uptime_s/3600)+' h' : '-';
      const err = d.error ? `<div class="hint" style="color:var(--danger)">${d.error}</div>` : '';
      const updBtn = (d.online && d.firmware_update_available)
        ? `<button class="small" style="background:#eab308" onclick="triggerFirmwareUpdate('${d.key}','${d.name.replace(/'/g,"&#39;")}')">⬆ Update starten</button>`
        : '';

        <div class="info">
          <h4>${d.name} <span class="hint" style="font-weight:400">(${d.host})</span></h4>
          <p>${status} · Latenz: ${lat} · Uptime: ${upt} · FW: ${fw}${upd}</p>

        <div>${updBtn}</div>
      </div>`;
    }).join("");
    el.innerHTML = rows + `<p class="hint" style="margin-top:8px">Aktualisiert: ${new Date(j.ts*1000).toLocaleTimeString()}</p>`;
  } catch(e) { el.innerHTML = `<p class="hint">Fehler: ${e.message}</p>`; }
}

function wireListEvents(root) {
  (root || document).querySelectorAll('.list-field[data-list="1"]').forEach(fld => {
    if (fld.dataset.wired) return;
    fld.dataset.wired = "1";
    const schemaTpl = fld.querySelector('.list-schema');
    let meta = {schema:[], defaults:{}, itemLabel:"Eintrag"};
    try { meta = JSON.parse(decodeURIComponent(schemaTpl.innerHTML)); } catch(e){}
    fld.addEventListener('click', ev => {
      const del = ev.target.closest('.list-item-del');
      if (del) {
        ev.preventDefault();
        del.closest('.list-item').remove();
        return;
      }
      const add = ev.target.closest('.list-add');
      if (add) {
        ev.preventDefault();
        const container = fld.querySelector('.list-container');
        const emptyHint = container.querySelector('.hint'); if (emptyHint) emptyHint.remove();
        const idx = container.querySelectorAll('.list-item').length;
        // Render a new item by calling renderListField with a single-item array, then extract
        const fakeVal = [Object.assign({}, meta.defaults)];
        const tmp = document.createElement('div');
        tmp.innerHTML = renderListField({key:"_tmp",label:"",itemLabel:meta.itemLabel,schema:meta.schema,defaults:meta.defaults}, fakeVal);
        const newItem = tmp.querySelector('.list-item');
        if (newItem) {
          newItem.dataset.idx = idx;
          container.appendChild(newItem);
        }
      }
    });
  });
}

async function addByIp() {
  const ip = $("#probe-ip").value.trim();
  if (!ip) return;
  let username = "admin";
  let password = "";
  const r = await fetch("/api/devices",{method:"POST",
    headers:{"Content-Type":"application/json"},body:JSON.stringify({host:ip, username, password})});
  const j = await r.json();
  if (j.ok) { toast(T("settings.toast.device_added","✓ Device added")); $("#probe-ip").value=""; reload(); return; }
  if (j.error === "auth_required") {
    const pw = prompt("Device " + ip + " is password-protected.\nEnter the admin password:");
    if (!pw) return;
    const r2 = await fetch("/api/devices",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({host:ip, username, password: pw})});
    const j2 = await r2.json();
    if (j2.ok) { toast("✓ Device added with credentials"); $("#probe-ip").value=""; reload(); }
    else toast("Auth failed: " + (j2.error||"unknown"), "error");
    return;
  }
  toast("Error: " + j.error, "error");
}

async function deleteDevice(key) {
  if (!confirm(T("settings.devices.confirm_remove","Gerät {key} wirklich entfernen?",{key:key}))) return;
  const r = await fetch("/api/devices/"+encodeURIComponent(key),{method:"DELETE"});
  const j = await r.json();
  if (j.ok) { toast(T("settings.toast.device_removed","✓ Gerät entfernt")); reload(); }
  else toast(T("settings.toast.error","Fehler: {err}",{err:j.error}), "error");
}

async function testConnection(which) {
  toast(T("settings.toast.testing","Teste {what}…",{what:which}));
  const r = await fetch("/api/settings/test-"+which,{method:"POST"});
  const j = await r.json();
  if (j.ok) toast("✓ " + (j.message||"OK"));
  else toast(T("settings.toast.error","Fehler: {err}",{err:j.error}), "error");
}

async function reload() {
  try {
    const [cfgR, devR, i18nR, zonesR] = await Promise.all([
      fetch("/api/settings").then(r=>r.json()),
      fetch("/api/devices").then(r=>r.json()),
      fetch("/api/i18n?prefix=settings.").then(r=>r.json()).catch(_=>({map:{}})),
      fetch("/api/zones").then(r=>r.json()).catch(_=>({spot_energy_charts:[], spot_awattar:[], co2:[]})),
    ]);
    cfg = cfgR;
    devices = devR.devices || [];
    I18N = (i18nR && i18nR.map) || {};
    ZONES = zonesR || ZONES;
    // Apply i18n to header + title
    try {
      document.title = T("settings.page.title", "Einstellungen") + " – Shelly Energy Analyzer";
      var pt = document.getElementById("page-title"); if (pt) pt.textContent = "⚙ " + T("settings.page.title", "Einstellungen");
      var nb = document.getElementById("nav-back"); if (nb) nb.textContent = T("settings.nav.back", "← Dashboard");
      document.documentElement.lang = (i18nR && i18nR.lang) || "de";
    } catch(e){}
    renderAll();
  } catch(e) {
    $("#main").innerHTML = '<p style="color:var(--danger)">'+T("settings.toast.error","Fehler: {err}",{err:e.message})+'</p>';
  }
}

reload();
</script>
</body>
</html>
